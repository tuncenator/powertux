# powertux: relax /sys/class/powercap/intel-rapl:0/energy_uj to 0444 so the
# user-scope autod daemon can read CPU package energy without sudo. Applied
# at boot by systemd-tmpfiles-setup; also re-applied on install.
#
# Side-channel note: RAPL fine-grained reads can in principle leak CPU
# activity timing. We sample every 5s, far below the resolution required
# for known attacks. The chmod is no wider than several upstream distros
# already ship.
z /sys/class/powercap/intel-rapl:0/energy_uj 0444 root root -
